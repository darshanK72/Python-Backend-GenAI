services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: embeddings-pgvector
    environment:
      POSTGRES_USER: vectordb
      POSTGRES_PASSWORD: vectordb
      POSTGRES_DB: vectordb
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectordb -d vectordb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
