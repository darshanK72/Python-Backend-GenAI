<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Contact form</h1>
  {% if submitted %}<p class="success">Thanks, {{ name }}!</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
  </form>
</body>
</html>
