<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Products</h1>
  <ul>
  {% for product in object_list %}
    <li>{{ product.name }} — ₹{{ product.price }}</li>
  {% empty %}
    <li>No products. POST to /api/products/ or use /admin/</li>
  {% endfor %}
  </ul>
</body>
</html>
